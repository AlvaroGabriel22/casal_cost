services:
  db:
    image: postgres:16-alpine
    container_name: casalcost-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: couple_finance_db
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d couple_finance_db"]
      interval: 3s
      timeout: 5s
      retries: 10
